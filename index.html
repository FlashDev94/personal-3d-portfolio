<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Personal 3D portfolio — full stack software engineer projects, experience, and contact."
    />
    <meta name="theme-color" content="#050816" />
    <title>Personal 3D Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
    />
    <style>
      /* Critical boot paint before JS — avoids white flash */
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #050816;
        color: #fff;
      }
      html[data-mode="light"],
      html[data-mode="light"] body {
        background: #f3f5fb;
        color: #0f172a;
      }
      #root {
        min-height: 100vh;
      }
      .boot-critical {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(
          ellipse at 50% 40%,
          #1a1430 0%,
          #050816 65%
        );
        font-family: system-ui, sans-serif;
      }
      html[data-mode="light"] .boot-critical {
        background: radial-gradient(
          ellipse at 50% 40%,
          #e8ecf6 0%,
          #f3f5fb 65%
        );
      }
      .boot-critical__pulse {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: 2px solid rgba(145, 94, 255, 0.35);
        border-top-color: #915eff;
        animation: bootspin 0.7s linear infinite;
      }
      @keyframes bootspin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .boot-critical__pulse {
          animation: none;
          border-color: #915eff;
        }
      }
    </style>
    <script>
      /* Restore color mode early to avoid dark→light flash */
      (function () {
        try {
          var raw = localStorage.getItem("portfolio-config-v1");
          if (!raw) return;
          var parsed = JSON.parse(raw);
          var mode = parsed && parsed.theme3d && parsed.theme3d.colorMode;
          if (mode === "light" || mode === "dark") {
            document.documentElement.dataset.mode = mode;
            document.documentElement.style.colorScheme = mode;
            if (mode === "light") {
              document.documentElement.style.setProperty("--color-primary", "#f3f5fb");
              document.documentElement.style.setProperty("--color-fg", "#0f172a");
              var meta = document.querySelector('meta[name="theme-color"]');
              if (meta) meta.setAttribute("content", "#f3f5fb");
            }
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div class="boot-critical" id="boot-critical" aria-hidden="true">
        <div class="boot-critical__pulse"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
